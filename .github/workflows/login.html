<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fashion Hub (Table Edition)</title>
</head>

<body bgcolor="#f8fafc" text="#1e293b">
    <!-- Main Layout Table -->
    <table width="100%" border="0" cellpadding="0" cellspacing="0">
        <!-- Header -->
        <tr>
            <td bgcolor="#ffffff" style="border-bottom: 1px solid #e2e8f0;">
                <table width="90%" align="center" border="0" cellpadding="20" cellspacing="0">
                    <tr>
                        <td align="left">
                            <a href="index.html" style="text-decoration: none; font-size: 24px; font-weight: bold; color: #0f172a;">
                                Fashion<span style="color: #4f46e5;">Hub</span>
                            </a>
                        </td>
                        <td align="right">
                            <table border="0" cellpadding="0" cellspacing="15">
                                <tr>
                                    <td><a href="index.html" style="text-decoration: none; color: #1e293b;">Home</a></td>
                                    <td><a href="products.html" style="text-decoration: none; color: #1e293b;">Products</a></td>
                                    <td><a href="contact.html" style="text-decoration: none; color: #1e293b;">Contact</a></td>
                                    <td><a href="login.html" style="text-decoration: none; color: #4f46e5; font-weight: bold;">Login</a></td>
                                    <td>
                                        <a href="cart.html" style="text-decoration: none; color: #1e293b; position: relative;">
                                            Cart (<span class="cart-count">0</span>)
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Login Form Content -->
        <tr>
            <td bgcolor="#ffffff" style="padding: 100px 0;">
                <table width="400" align="center" border="0" cellpadding="40" cellspacing="0" style="border: 1px solid #e2e8f0; border-radius: 15px; background-color: #ffffff;">
                    <tr>
                        <td>
                            <h2 align="center" style="font-size: 32px; color: #0f172a; margin: 0 0 10px;">Welcome Back</h2>
                            <p align="center" style="color: #64748b; margin-bottom: 30px;">Enter your credentials to access your account</p>
                            
                            <form action="#" onsubmit="event.preventDefault(); alert('Login successful!'); window.location.href='index.html'">
                                <table width="100%" border="0" cellpadding="0" cellspacing="0">
                                    <tr>
                                        <td style="padding-bottom: 20px;">
                                            <label style="display: block; font-weight: bold; margin-bottom: 8px;">Email Address</label>
                                            <input type="email" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;" placeholder="example@mail.com" required>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td style="padding-bottom: 10px;">
                                            <label style="display: block; font-weight: bold; margin-bottom: 8px;">Password</label>
                                            <input type="password" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;" placeholder="••••••••" required>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td align="right" style="padding-bottom: 25px;">
                                            <a href="#" style="color: #64748b; text-decoration: none; font-size: 14px;">Forgot password?</a>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <button type="submit" style="width: 100%; background: #0f172a; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px;">
                                                Sign In
                                            </button>
                                        </td>
                                    </tr>
                                </table>
                            </form>
                            
                            <div align="center" style="margin-top: 30px; font-size: 14px; color: #64748b;">
                                Don't have an account? <a href="register.html" style="color: #4f46e5; text-decoration: none; font-weight: bold;">Registration</a>
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Footer -->
        <tr>
            <td bgcolor="#0f172a" style="padding: 60px 5%; color: #94a3b8;">
                <table width="100%" border="0" cellpadding="0" cellspacing="0">
                    <tr>
                        <td align="left" style="font-size: 24px; font-weight: bold; color: white;">
                            Fashion<span style="color: #4f46e5;">Hub</span>
                        </td>
                        <td align="right">
                            © 2026. 20-COM.069-RASHMILA.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <script>
        let cart = JSON.parse(localStorage.getItem('fashionHubCart')) || [];
        function updateCartBadge() {
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badges = document.querySelectorAll('.cart-count');
            badges.forEach(badge => {
                badge.innerText = totalCount;
            });
        }
        document.addEventListener('DOMContentLoaded', updateCartBadge);
    </script>
</body>

</html>
