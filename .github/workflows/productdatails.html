<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Fashion Hub (Table Edition)</title>
</head>

<body bgcolor="#f8fafc" text="#1e293b">
    <!-- Main Layout Table -->
    <table width="100%" border="0" cellpadding="0" cellspacing="0">
        <!-- Header -->
        <tr>
            <td bgcolor="#ffffff" style="border-bottom: 1px solid #e2e8f0;">
                <table width="90%" align="center" border="0" cellpadding="20" cellspacing="0">
                    <tr>
                        <td align="left">
                            <a href="index.html"
                                style="text-decoration: none; font-size: 24px; font-weight: bold; color: #0f172a;">
                                Fashion<span style="color: #4f46e5;">Hub</span>
                            </a>
                        </td>
                        <td align="right">
                            <table border="0" cellpadding="0" cellspacing="15">
                                <tr>
                                    <td><a href="index.html" style="text-decoration: none; color: #1e293b;">Home</a>
                                    </td>
                                    <td><a href="index.html#about"
                                            style="text-decoration: none; color: #1e293b;">About</a></td>
                                    <td><a href="index.html#services"
                                            style="text-decoration: none; color: #1e293b;">Services</a></td>
                                    <td><a href="products.html"
                                            style="text-decoration: none; color: #4f46e5; font-weight: bold;">Products</a>
                                    </td>
                                    <td><a href="contact.html"
                                            style="text-decoration: none; color: #1e293b;">Contact</a></td>
                                    <td><a href="login.html" style="text-decoration: none; color: #1e293b;">Login</a>
                                    </td>
                                    <td>
                                        <a href="cart.html"
                                            style="text-decoration: none; color: #1e293b; position: relative;">
                                            Cart (<span class="cart-count">0</span>)
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Product Details Content -->
        <tr>
            <td bgcolor="#ffffff" style="padding: 60px 5%;">
                <table width="100%" max-width="1200" align="center" border="0" cellpadding="0" cellspacing="0"
                    id="product-details-container">
                    <!-- Dynamic Content Injected Here -->
                </table>
            </td>
        </tr>

        <!-- Footer -->
        <tr>
            <td bgcolor="#0f172a" style="padding: 60px 5%; color: #94a3b8;">
                <table width="100%" border="0" cellpadding="0" cellspacing="0">
                    <tr>
                        <td align="left" style="font-size: 24px; font-weight: bold; color: white;">
                            Fashion<span style="color: #4f46e5;">Hub</span>
                        </td>
                        <td align="right">
                            © 2026. 20-COM.069-RASHMILA
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <script>
        const productsData = {
            'p1': {
                name: 'Midnight Silk Blouse',
                price: 12500,
                image: 'images/product1.png',
                description: 'A versatile wardrobe staple. This sleek midnight blue silk blouse is remarkably soft and drapes elegantly. Dress it up for the evening or pair it with tailored trousers for a sophisticated daytime look.'
            },
            'p2': {
                name: 'Tailored Linen Trousers',
                price: 9800,
                image: './images/product2.jpg',
                description: 'Experience ultimate comfort with our Tailored Linen Trousers. Perfect for any casual outing or smart-casual event.'
            },
            'p3': {
                name: 'Cashmere Blend Coat',
                price: 24000,
                image: 'images/product3.png',
                description: 'Stay warm and stylish with this luxurious cashmere blend coat. An essential layering piece for the colder months.'
            },
            'p4': {
                name: 'Minimalist Leather Tote',
                price: 15500,
                image: 'images/product4.png',
                description: 'A sleek minimalist leather tote bag designed to carry all your daily essentials with effortless style and durability.'
            },
            'p5': {
                name: 'Gold Vermeil Hoops',
                price: 4200,
                image: 'images/product5.png',
                description: 'Add a touch of elegance to your look with these stunning gold vermeil hooks. A timeless accessory for any occasion.'
            },
            'p6': {
                name: 'Classic Suede Loafers',
                price: 14000,
                image: 'images/product6.png',
                description: 'Step into comfort and class with these classic suede loafers. Perfect for both office wear and weekend outings.'
            }
        };

        let cart = JSON.parse(localStorage.getItem('fashionHubCart')) || [];

        document.addEventListener('DOMContentLoaded', () => {
            updateCartBadge();

            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const container = document.getElementById('product-details-container');

            if (productId && productsData[productId]) {
                const product = productsData[productId];
                document.title = `${product.name} | Fashion Hub`;

                container.innerHTML = `
                    <tr>
                        <td width="50%" valign="top" style="padding-right: 40px;">
                            <img src="${product.image}" alt="${product.name}" width="100%" style="border-radius: 15px; border: 1px solid #e2e8f0;">
                        </td>
                        <td width="50%" valign="top">
                            <h1 style="font-size: 42px; color: #0f172a; margin-bottom: 10px;">${product.name}</h1>
                            <p style="font-size: 32px; color: #4f46e5; font-weight: bold; margin-bottom: 20px;">Rs. ${product.price.toLocaleString()}</p>
                            <p style="font-size: 18px; color: #64748b; line-height: 1.8; margin-bottom: 30px;">${product.description}</p>
                            <table border="0" cellpadding="0" cellspacing="10">
                                <tr>
                                    <td>
                                        <button onclick="addCart({id:'${productId}', name:'${product.name}', price:${product.price}, image:'${product.image}'})" style="background: #0f172a; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;">
                                            Add to Cart
                                        </button>
                                    </td>
                                    <td>
                                        <a href="checkout.html" onclick="addCart({id:'${productId}', name:'${product.name}', price:${product.price}, image:'${product.image}'})" style="display: inline-block; border: 2px solid #e2e8f0; color: #0f172a; text-decoration: none; padding: 13px 30px; border-radius: 8px; font-weight: bold; font-size: 16px;">
                                            Buy Now
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                `;
            } else {
                container.innerHTML = `
                    <tr>
                        <td align="center" style="padding: 100px 0;">
                            <h2 style="font-size: 32px; color: #0f172a;">Product Not Found</h2>
                            <p style="color: #64748b; margin-bottom: 30px;">The product you are looking for does not exist.</p>
                            <a href="products.html" style="background: #4f46e5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold;">Browse All Products</a>
                        </td>
                    </tr>
                `;
            }
        });

        function updateCartBadge() {
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badges = document.querySelectorAll('.cart-count');
            badges.forEach(badge => {
                badge.innerText = totalCount;
            });
        }

        function addCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            localStorage.setItem('fashionHubCart', JSON.stringify(cart));
            updateCartBadge();
            alert('Product added to cart!');
        }
    </script>
</body>

</html>
